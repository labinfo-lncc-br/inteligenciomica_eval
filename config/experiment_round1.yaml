# Rodada 1 de avaliação — InteligenciÔmica Eval (§12.1)
# Endpoints NUNCA entram neste arquivo (ADR-008). Use variáveis de ambiente.

round_id: "round-1"

# Registry de modelos + layout de GPUs (§8/§12.1) — arquivo SEPARADO.
# Path relativo a este YAML de rodada; carregado à parte pelo DIContainer (TAREFA-309).
model_registry_path: "model_registry.yaml"

# Arquivo JSONL de perguntas do benchmark (TAREFA-313):
# Precedência de carregamento (build_container):
#   (a) env BENCHMARK_QUESTIONS_PATH → override, máxima prioridade
#   (b) questions (este campo), se definido → path relativo a este YAML
#   (c) ausente (default) → questions_rf1.jsonl empacotado no pacote Python
# Para usar o arquivo empacotado de produção, omita este campo (ou deixe-o null).
# questions: "caminho/para/perguntas.jsonl"

phases:
  - "A"
  - "B"

bases:
  - "IDx_400k"
  - "ID_230K"

llms:
  # Roster canônico da Rodada 1 (doc §15.3 l.826); deve casar com os `name` de
  # config/model_registry.yaml e com os LLMId de domínio.
  - "gpt-oss-120b"
  - "gemma4:31b"
  - "qwen3.6:35b"
  - "glm-4.7-flash"
  - "llama4:16x17b"

seeds:
  - 42
  - 123
  - 456

temperature: 0.0

retrieval:
  top_k: 5
  reranker: null
  # PENDENTE: baseline de retrieval da Rodada 1. O doc deixa estes como
  # `<baseline-a-definir>` (§15 l.832-833); a variação de chunk/embedding é a
  # Rodada 2 (TAREFA-505/506). Definir o baseline de produção na operacionalização.
  embedding_model: "PENDENTE-rodada1"
  chunk_strategy: "PENDENTE-rodada1"

judge:
  # Prometheus-2 8x7B (doc §15.3 l.835/1143). `model` = nome lógico (casa com o
  # `name` do registry); o hf_repo completo vive em model_registry.yaml.
  model: "prometheus-8x7b-v2.0"
  endpoint_env: "VLLM_JUDGE_URL"     # nome da env var; valor resolvido em runtime
  batch_invariant: true              # ADR-003: juiz DEVE ser determinístico
  temperature: 0.0

scoring:
  weights:
    answer_correctness:  0.25
    answer_similarity:   0.15
    faithfulness:        0.20
    context_precision:   0.10
    context_recall:      0.10
    answer_relevancy:    0.05
    bertscore_f1:        0.05
    rubric_biomed_score: 0.10
  failure_threshold: 0.30

experiment_b:
  canonical_context_source: "IDx_400k"
  canonical_top_k: 5

# Bundle de prompt de geração (ADR-015, TAREFA-316):
# Replica o prompt de produção verbatim (system_prompt.txt + _build_prompt_with_context).
# Para A/B de redações de prompt, criar nova versão em
# src/inteligenciomica_eval/infrastructure/prompts/rag/ e alterar este campo.
generation_prompt_version: "v1_production"
