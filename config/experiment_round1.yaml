round_id: "round-1"

phases:
  - "A"
  - "B"

bases:
  - "IDx_400k"
  - "ID_230K"

llms:
  - "meta-llama/Llama-3.1-8B-Instruct"
  - "meta-llama/Llama-3.1-70B-Instruct"

seeds:
  - 42
  - 123
  - 456

temperature: 0.0

