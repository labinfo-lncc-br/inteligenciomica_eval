repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy strict
        language: system
        entry: uv run mypy --strict
        args: [src]
        types: [python]
        pass_filenames: false
