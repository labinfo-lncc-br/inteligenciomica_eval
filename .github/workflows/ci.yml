name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  unit:
    name: Lint, type-check, unit + e2e tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy --strict src

      - name: Import linter
        run: uv run lint-imports

      - name: Unit + e2e tests with coverage
        # Excludes integration tests (they need a Qdrant backend — see the
        # `integration` job). pytest-randomly shuffles order to catch coupling.
        run: >-
          uv run pytest -m "not integration"
          --cov=src --cov-report=xml:unit-coverage.xml
          --cov-fail-under=85 -n auto

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: unit-coverage.xml
          flags: unit
          fail_ci_if_error: false

  integration:
    name: Integration tests (real Qdrant)
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:v1.9
        ports:
          - 6333:6333

    env:
      # The integration suite connects here instead of spinning up testcontainers.
      QDRANT_URL: http://localhost:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Integration tests with coverage
        # No --cov-fail-under here: the integration suite alone is not meant to
        # reach 85% (the `unit` job guards the global threshold). Coverage is
        # reported separately so the adapters' end-to-end coverage is visible.
        run: >-
          uv run pytest -m integration
          --cov=src --cov-report=term-missing --cov-report=xml:integration-coverage.xml
          -v tests/integration/

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: integration-coverage.xml
          flags: integration
          fail_ci_if_error: false

  mutation-gate:
    name: Mutation gate M6 (domain/services — score ≥ 80%)
    runs-on: ubuntu-latest
    # Roda apenas em push para main OU via disparo manual.
    # NÃO executa em cada PR — protege o tempo de CI (mutmut é lento).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run mutation gate
        run: uv run python scripts/mutation_gate.py

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: tests/mutation/mutation_report.txt

  e2e:
    name: E2E gate M4 (decisão executiva)
    runs-on: ubuntu-latest
    needs: [unit, integration]
    timeout-minutes: 10

    services:
      qdrant:
        image: qdrant/qdrant:v1.9
        ports:
          - 6333:6333

    env:
      QDRANT_URL: http://localhost:6333
      E2E_ENABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen

      - name: E2E M4 gate
        run: >-
          uv run pytest -m e2e
          tests/e2e/test_full_pipeline_m4.py -v
